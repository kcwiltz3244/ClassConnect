<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><meta name="theme-color" content="#4b0877"><title>ClassConnect Admin</title><link rel="stylesheet" href="styles.css"></head>
<body>
<header class="app-header"><div class="brand"><div class="logo">76</div><div><strong>Committee Admin</strong><small>ClassConnect</small></div></div><a class="install-btn" href="index.html" style="text-decoration:none">Back</a></header>
<main style="padding:18px;max-width:760px;margin:auto">
  <section class="panel">
    <h1>Approve submissions</h1>
    <p>Enter the admin key stored in Apps Script.</p>
    <label class="search"><span>🔑</span><input id="adminKey" type="password" placeholder="Admin key"></label>
    <button id="loadPending" class="primary" style="margin-top:12px">Load Pending Items</button>
  </section>
  <section class="panel"><h2>Pending profiles</h2><div id="pendingProfiles"></div></section>
  <section class="panel"><h2>Pending messages</h2><div id="pendingMessages"></div></section>
</main>
<div id="toast" class="toast"></div>
<script src="config.js"></script><script src="admin.js"></script>
</body></html>
